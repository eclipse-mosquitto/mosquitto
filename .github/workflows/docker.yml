name: Docker

on:
  push:
    branches:
      - master
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        base_image:
          - alpine
          - ubuntu

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io/eclipse-mosquitto
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        push: true
        platforms: linux/amd64, linux/arm64
        context: docker/2.1-${{ matrix.base_image }}
        tags: |
          ghcr.io/eclipse-mosquitto/mosquitto:2.1-${{ matrix.base_image }}
