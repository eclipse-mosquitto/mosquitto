name: Coverity Scan fixes branch on a weekly basis

on:
  workflow_dispatch:
  schedule:
    - cron: "7 3 * * 3"

jobs:
  coverity:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: fixes

    - name: Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            cmake \
            docbook-xsl \
            g++ \
            gcc \
            google-mock \
            googletest \
            lcov \
            libc-ares-dev \
            libcjson-dev \
            libcjson1 \
            libcunit1-dev \
            libedit-dev \
            libeditreadline-dev \
            libgmock-dev \
            libgtest-dev \
            libmicrohttpd-dev \
            libsqlite3-dev \
            libssl-dev \
            libwrap0-dev \
            microsocks \
            python3-all \
            python3-paho-mqtt \
            python3-psutil \
            uthash-dev \
            xsltproc

    - run: cmake -E make_directory build
    - run: |
        cmake \
          -DCMAKE_BUILD_TYPE=Debug \
          -S . \
          -B build

    - uses: vapier/coverity-scan-action@v1
      with:
        build_language: 'cxx'
        project: "eclipse/mosquitto"
        token: ${{ secrets.COVERITY_SCAN_TOKEN }}
        email: ${{ secrets.COVERITY_SCAN_EMAIL }}
        command: "make -C ${{ github.workspace }}/build -j$(nproc)"
